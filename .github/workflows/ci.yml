name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: growthtrack_test
          POSTGRES_PASSWORD: growthtrack_test
          POSTGRES_DB: growthtrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U growthtrack_test -d growthtrack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: growthtrack
      # CI uses one role for both URLs — the migrator/app split (docker/postgres/init-roles.sh)
      # is a deployed-environment least-privilege concern, not a CI correctness concern.
      POSTGRES_MIGRATOR_USER: growthtrack_test
      POSTGRES_MIGRATOR_PASSWORD: growthtrack_test
      POSTGRES_APP_USER: growthtrack_test
      POSTGRES_APP_PASSWORD: growthtrack_test
      JWT_SIGNING_KEY: ci-test-signing-key
      TWILIO_ACCOUNT_SID: ci-test-sid
      TWILIO_AUTH_TOKEN: ci-test-token
      TWILIO_WHATSAPP_NUMBER: "+10000000000"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy api domain ports adapters scheduler config.py

      - name: Import-boundary check (AD-1)
        run: uv run lint-imports

      - name: Migration chain round-trip (upgrade / downgrade / upgrade)
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Test (pytest)
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
