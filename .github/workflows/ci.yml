name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: growthtrack_test
          POSTGRES_PASSWORD: growthtrack_test
          POSTGRES_DB: growthtrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U growthtrack_test -d growthtrack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: growthtrack
      # Distinct role names (not all "growthtrack_test") so
      # docker/postgres/init-roles.sh actually runs for real below, instead
      # of a no-op CREATE ROLE against a name that already exists.
      POSTGRES_MIGRATOR_USER: growthtrack_test
      POSTGRES_MIGRATOR_PASSWORD: growthtrack_test
      POSTGRES_APP_USER: growthtrack_app_test
      POSTGRES_APP_PASSWORD: growthtrack_app_test
      POSTGRES_BACKUP_USER: growthtrack_backup_test
      POSTGRES_BACKUP_PASSWORD: growthtrack_backup_test
      JWT_SIGNING_KEY: ci-test-signing-key
      TWILIO_ACCOUNT_SID: ci-test-sid
      TWILIO_AUTH_TOKEN: ci-test-token
      TWILIO_WHATSAPP_NUMBER: "+10000000000"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync --locked

      - name: Provision least-privilege roles (init-roles.sh)
        env:
          PGHOST: localhost
          PGPASSWORD: ${{ env.POSTGRES_MIGRATOR_PASSWORD }}
          POSTGRES_USER: ${{ env.POSTGRES_MIGRATOR_USER }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends postgresql-client
          ./docker/postgres/init-roles.sh

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy api domain ports adapters scheduler config.py alembic/env.py

      - name: Import-boundary check (AD-1)
        run: uv run lint-imports

      - name: Migration chain round-trip (upgrade / downgrade / upgrade)
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Test (pytest)
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build

  docker-build:
    # Neither image is built anywhere else in CI — bare `uv`/`npm` steps
    # above don't exercise the Dockerfiles at all, so a broken COPY path or
    # multi-stage build regression would otherwise only surface at deploy
    # time.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build backend image (api/scheduler)
        run: docker build -f docker/backend.Dockerfile -t growthtrack-backend:ci .

      - name: Build nginx image
        run: docker build -f docker/nginx.Dockerfile -t growthtrack-nginx:ci .

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
